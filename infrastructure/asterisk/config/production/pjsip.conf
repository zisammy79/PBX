# Production Asterisk overlay — applied by entrypoint when PBX_ENV=production
#
# - SIP credentials are generated by the control plane (no default extension passwords)
# - ARI limited to internal Docker network
# - AMI disabled
# - Narrow RTP range must match Terraform firewall and Compose publish range
# - Emergency calling is NOT enabled

[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060
external_media_address=__SIP_EXTERNAL_IP__
external_signaling_address=__SIP_EXTERNAL_IP__

[transport-tcp]
type=transport
protocol=tcp
bind=0.0.0.0:5060
external_media_address=__SIP_EXTERNAL_IP__
external_signaling_address=__SIP_EXTERNAL_IP__

; SIP TLS template — enable when SIP_TLS_ENABLED=true and certificates are provisioned
;[transport-tls]
;type=transport
;protocol=tls
;bind=0.0.0.0:5061
;cert_file=/etc/asterisk/keys/asterisk.pem
;priv_key_file=/etc/asterisk/keys/asterisk.key
;method=tlsv1_2

#include /etc/asterisk/pbx-generated/active/pjsip-tenants.conf
