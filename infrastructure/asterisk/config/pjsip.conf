; PBX Platform — base PJSIP configuration (transport only; tenants in pbx-generated)

[global]
type=global
endpoint_identifier_order=username,ip,anonymous

[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060
allow_reload=yes
local_net=172.25.0.0/16
local_net=127.0.0.0/8

#include pbx-generated/active/pjsip-tenants.conf