; PBX Platform — base PJSIP configuration (transport only; tenants in pbx-generated)

[global]
type=global
endpoint_identifier_order=username,ip,anonymous

[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060
allow_reload=yes
external_signaling_address=__SIP_EXTERNAL_SIGNALING__
external_media_address=__SIP_EXTERNAL_MEDIA__
external_signaling_port=__SIP_EXTERNAL_PORT__
local_net=172.16.0.0/12
local_net=10.0.0.0/8
local_net=192.168.0.0/16
local_net=127.0.0.0/8

#include pbx-generated/active/pjsip-tenants.conf