global:
  scrape_interval: 30s
  evaluation_interval: 30s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['127.0.0.1:9090']

  - job_name: api
    metrics_path: /api/v1/metrics
    static_configs:
      - targets: ['127.0.0.1:3001']
    # Requires API metrics endpoint; scrape via host network until sidecar added

  - job_name: postgres-exporter
    static_configs:
      - targets: ['127.0.0.1:9187']
    # Optional — deploy postgres_exporter when enabled

  - job_name: node
    static_configs:
      - targets: ['127.0.0.1:9100']
    # Optional — node_exporter on host
